repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        args: [--exclude, ".venv/|/venv/|ui/"]

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: system
        entry: ui/node_modules/.bin/prettier
        args:
          - --check
          - --config=ui/.prettierrc
          - --plugin=ui/node_modules/prettier-plugin-svelte/plugin.js
        files: ^ui/.*\.(js|ts|svelte|css|json|md)$
